name: Clonar Voz (Python + Java) - RÁPIDO con caché

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Texto que quieres que diga la voz clonada'
        required: true
        default: 'Hola, esta es mi voz clonada exactamente tal cual.'
      language:
        description: 'Idioma (es para español)'
        required: false
        default: 'es'

jobs:
  clonar-voz:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11 + caché pip
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'                    # ← Ahora funciona porque tenemos requirements.txt

      - name: 📦 Cachear modelo XTTS-v2 (el que más tiempo ahorra)
        uses: actions/cache@v4
        with:
          path: ~/.local/share/tts
          key: tts-models-xtts-v2-${{ runner.os }}
          restore-keys: |
            tts-models-xtts-v2-

      - name: ☕ Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Instalar ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Instalar Torch CPU + TTS
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: 🔨 Compilar Java
        run: javac VoiceCloner.java

      - name: 🎤 Ejecutar clonador de voz (Java → Python)
        run: |
          java VoiceCloner "${{ github.event.inputs.text }}" "Shakira_Feliz......turan.wav" "output.wav" "${{ github.event.inputs.language }}"

      - name: 📤 Subir audio generado
        uses: actions/upload-artifact@v4
        with:
          name: voz-clonada
          path: output.wav
